<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Task Dashboard</title>

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<!-- HEADER -->

<header>

<div class="greeting">

<h1>

Hello! Bhavana 👋

</h1>

<p id="taskCount">

You have 0 tasks today

</p>

</div>

<button id="addTaskBtn">

<i class="fa-solid fa-plus"></i>

Quick Add

</button>

</header>

<!-- PAGE TITLE -->

<div class="dashboardTitle">

<h2>

Task Categories

</h2>

<p>

Select a category to manage assignments.

</p>

</div>

<!-- CATEGORY GRID -->

<section class="categories">

<!-- PERSONAL -->

<a
href="category.html?category=Personal"
class="category-card">

<i class="fa-solid fa-user"></i>

<h3>Personal</h3>

<span>

Daily routines & notes

</span>

</a>

<!-- WORK -->

<a
href="category.html?category=Work"
class="category-card">

<i class="fa-solid fa-briefcase"></i>

<h3>Work</h3>

<span>

Projects & meetings

</span>

</a>

<!-- HEALTH -->

<a
href="category.html?category=Health"
class="category-card">

<i class="fa-solid fa-heart-pulse"></i>

<h3>Health</h3>

<span>

Health activities

</span>

</a>

<!-- CODING -->

<a
href="category.html?category=Coding"
class="category-card">

<i class="fa-solid fa-code"></i>

<h3>Coding</h3>

<span>

Programming tasks

</span>

</a>

<!-- FITNESS -->

<a
href="category.html?category=Fitness"
class="category-card">

<i class="fa-solid fa-dumbbell"></i>

<h3>Fitness</h3>

<span>

Workout tracking

</span>

</a>

<!-- SHOPPING -->

<a
href="category.html?category=Shopping"
class="category-card">

<i class="fa-solid fa-cart-shopping"></i>

<h3>Shopping</h3>

<span>

Purchase lists

</span>

</a>

<!-- EDUCATION -->

<a
href="category.html?category=Education"
class="category-card">

<i class="fa-solid fa-book"></i>

<h3>Education</h3>

<span>

Study assignments

</span>

</a>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
